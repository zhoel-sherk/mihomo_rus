# =============================================================================
# СЦЕНАРИЙ 07 — Блокировка рекламы: ad-filter (Hagezi Pro → adlist.mrs)
#
# ИСТОЧНИК
#   https://github.com/zxc-rv/ad-filter — доменные списки в .mrs / .srs / .dat
#   для Mihomo, Sing-Box, Xray. Ниже — фрагмент как в README проекта (Mihomo).
#
# ИДЕЯ
#   Один rule-provider (behavior: domain, format: mrs) + правило RULE-SET,adlist,REJECT
#   раньше общих правил на прокси, чтобы рекламные домены отсекались локально.
#
# КАК ИСПОЛЬЗОВАТЬ
#   Вставьте rule-providers.adlist и строку в rules: (обычно вверху списка, после
#   служебных DIRECT/LAN). Не дублируйте ключ rule-providers: — сольте с уже существующими.
#
# КУДА ЧИТАТЬ
#   ../../GUIDE.md#sec-rule-set-repos
# =============================================================================

rule-providers:
  adlist:
    type: http
    format: mrs
    behavior: domain
    url: https://github.com/zxc-rv/ad-filter/releases/latest/download/adlist.mrs
    path: ./rule-providers/adlist.mrs
    interval: 86400

rules:
  - RULE-SET,adlist,REJECT
  # далее — ваши обычные правила (GEOSITE, MATCH, …)
